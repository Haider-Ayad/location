<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Bike Pro Tracker</title>
  
  <!-- مكتبات الخرائط والخطوط -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet"/>
  
  <style>
    /* ─── CONFIG ─── */
    :root {
      --bg-dark: #0f172a;
      --bg-card: #1e293b;
      --primary: #2563eb;
      --primary-light: #60a5fa;
      --danger: #ef4444;
      --danger-light: #fca5a5;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --border: rgba(148, 163, 184, 0.15);
      --shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--bg-dark);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── HEADER ─── */
    header {
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 15px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .brand { font-weight: 900; font-size: 18px; letter-spacing: 1px; }
    
    .search-container {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 15px;
      display: flex;
      align-items: center;
      width: 45%;
    }
    .search-container input {
      background: transparent;
      border: none;
      color: white;
      width: 100%;
      font-family: inherit;
    }

    /* ─── TABS NAVIGATION ─── */
    .tabs-nav {
      display: flex;
      gap: 10px;
      padding: 15px 20px;
      overflow-x: auto;
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      background: rgba(255,255,255,0.05);
      border: none;
      color: var(--text-muted);
      padding: 10px 20px;
      border-radius: 20px;
      font-family: inherit;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: 0.3s;
    }
    .tab-btn.active {
      background: var(--primary);
      color: white;
      box-shadow: 0 0 15px rgba(37, 99, 235, 0.4);
    }

    /* ─── MAIN CONTENT ─── */
    main { flex: 1; position: relative; }
    .tab-content { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
    .tab-content.active { display: block; }

    /* ─── MAP SECTION ─── */
    #map { height: 60vh; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 20px; z-index: 1; }
    
    .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
    .stat-card {
      background: var(--bg-card); border: 1px solid var(--border);
      padding: 15px; border-radius: 12px; text-align: center;
    }
    .stat-val { font-family: 'Orbitron', sans-serif; font-size: 22px; font-weight: 900; color: var(--primary-light); }
    .stat-lbl { font-size: 12px; color: var(--text-muted); margin-top: 5px; }

    .join-btn {
      width: 100%; padding: 16px; border-radius: 14px; border: none;
      font-family: inherit; font-weight: 800; font-size: 16px;
      background: var(--primary); color: white; cursor: pointer;
      box-shadow: 0 4px 20px rgba(37, 99, 235, 0.3);
    }
    .join-btn.active { background: var(--danger); box-shadow: 0 4px 20px rgba(239, 68, 68, 0.3); }

    /* ─── MESSAGES SECTION ─── */
    .msg-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 16px; padding: 20px; margin-bottom: 15px;
      position: relative; overflow: hidden;
    }
    .msg-card::before {
      content: ''; position: absolute; top:0; right:0; width: 4px; height: 100%;
      background: var(--primary);
    }
    .msg-card.emergency::before { background: var(--danger); }
    
    .msg-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .msg-title { font-weight: 700; font-size: 16px; }
    .msg-time { font-size: 12px; color: var(--text-muted); }
    .msg-body { color: var(--text-main); line-height: 1.6; }

    /* ─── EMERGENCY SECTION ─── */
    .emergency-center { text-align: center; padding: 40px 20px; }
    .sos-btn {
      width: 100%; height: 120px; border-radius: 20px;
      background: linear-gradient(135deg, #ef4444, #b91c1c);
      color: white; border: none; font-size: 32px;
      cursor: pointer; box-shadow: 0 10px 40px rgba(239, 68, 68, 0.4);
      animation: pulse-red 2s infinite;
    }
    @keyframes pulse-red { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }

    /* ─── LOGIN OVERLAY ─── */
    #loginOverlay {
      position: fixed; inset: 0; background: var(--bg-dark);
      z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .login-box { width: 90%; max-width: 350px; }
    .input-f { margin-bottom: 15px; }
    .input-f input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg-card); color: white; }
    
    .auth-row { display: flex; gap: 10px; margin-top: 20px; }
    .auth-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; }
    .btn-register { background: white; color: var(--bg-dark); }
    .btn-login { background: var(--primary); color: white; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="loginOverlay">
    <div style="font-size:50px; margin-bottom:10px;">🚴</div>
    <h1 style="margin-bottom:20px;">BIKE PRO</h1>
    
    <div class="login-box">
      <div class="input-f">
        <input type="text" id="authName" placeholder="الاسم" style="text-align:center; font-weight:bold; font-size:18px;"/>
      </div>
      <div class="input-f">
        <input type="password" id="authPass" placeholder="كلمة المرور" style="text-align:center;"/>
      </div>
      <div class="input-f">
        <input type="tel" id="authPhone" placeholder="رقم الهاتف (للتسجيل)" style="text-align:center;" class="hidden"/>
      </div>
      
      <div style="display:flex; gap:10px; justify-content:center; margin-bottom:20px;">
        <label style="cursor:pointer; color:var(--primary-light)"><input type="radio" name="role" value="member" checked> عضو</label>
        <label style="cursor:pointer; color:var(--primary-light)"><input type="radio" name="role" value="captain"> كابتن</label>
      </div>

      <button class="join-btn" onclick="handleAuth()">دخول / تسجيل جديد</button>
      <p id="authMsg" style="text-align:center; font-size:12px; margin-top:10px; color:var(--danger)"></p>
    </div>
  </div>

  <!-- APP HEADER -->
  <header>
    <div class="brand">BIKE PRO</div>
    <div class="search-container">
      <span style="margin-left:8px; color:var(--text-muted)">🔍</span>
      <input type="text" placeholder="بحث عن عضو...">
    </div>
    <div id="userIcon" style="font-size:20px;">👤</div>
  </header>

  <!-- TABS -->
  <div class="tabs-nav">
    <button class="tab-btn active" onclick="switchTab('map')">🗺️ الخريطة</button>
    <button class="tab-btn" onclick="switchTab('messages')">📢 الرسائل</button>
    <button class="tab-btn" onclick="switchTab('emergency')">🚨 الطوارئ</button>
    <button class="tab-btn" onclick="switchTab('profile')">👤 بروفايلي</button>
  </div>

  <!-- CONTENT -->
  <main>
    
    <!-- TAB: MAP -->
    <div id="tab-map" class="tab-content active">
      <div id="map"></div>
      
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-val" id="distVal">---</div>
          <div class="stat-lbl">البعد عن الكابتن (م)</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="speedVal">0</div>
          <div class="stat-lbl">السرعة (كم/س)</div>
        </div>
      </div>

      <button id="btnJoin" class="join-btn" onclick="toggleTracking()">
        🚴 انضمام للرحلة ومشاركة الموقع
      </button>
    </div>

    <!-- TAB: MESSAGES -->
    <div id="tab-messages" class="tab-content">
      <div id="messageContainer">
        <!-- Messages will be injected here -->
        <div style="text-align:center; color:var(--text-muted); padding:40px;">جاري تحميل الرسائل...</div>
      </div>
    </div>

    <!-- TAB: EMERGENCY -->
    <div id="tab-emergency" class="tab-content">
      <div class="emergency-center">
        <div style="margin-bottom:20px; font-size:18px; color:var(--text-muted)">نظام الطوارئ السريع</div>
        <button class="sos-btn" onclick="triggerEmergency()">🚨 طوارئ</button>
        <div id="emergencyDisplay" style="margin-top:30px; padding:20px; background:rgba(239,68,68,0.1); border:1px solid var(--danger); border-radius:12px; display:none;">
          <h3 style="color:var(--danger);">⚠️ تنبيه طوارئ نشط</h3>
          <p id="emergencyText" style="margin-top:10px;">...</p>
        </div>
      </div>
    </div>

    <!-- TAB: PROFILE -->
    <div id="tab-profile" class="tab-content">
      <div class="msg-card" style="text-align:center;">
        <div style="font-size:50px; margin-bottom:10px;">👤</div>
        <h2 id="pName">اسم المستخدم</h2>
        <p id="pPhone" style="color:var(--text-muted); margin-bottom:20px;">07700000000</p>
        
        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-val" id="pTours">0</div>
            <div class="stat-lbl">رحلات</div>
          </div>
          <div class="stat-card">
            <div class="stat-val" id="pKm">0</div>
            <div class="stat-lbl">كم</div>
          </div>
        </div>

        <button class="join-btn" style="background:var(--bg-card); border:1px solid var(--border); box-shadow:none; color:var(--text-muted);" onclick="logout()">
          🚪 تسجيل الخروج
        </button>
      </div>
    </div>

  </main>

<script>
  /* ───── CONFIG ───── */
  const API_URL = "https://script.google.com/macros/s/AKfycbyMnNvVFVHoTqowD08cd0SLS3C8OYmD9-l8pjT7uff1CDmikEWR3LX6xb9yunyqHScR/exec";

  let state = {
    token: localStorage.getItem('token'),
    user: JSON.parse(localStorage.getItem('user')),
    role: 'member',
    watchId: null,
    map: null,
    captainMarker: null,
    myMarker: null
  };

  /* ───── AUTH ───── */
  function handleAuth() {
    const name = document.getElementById('authName').value;
    const pass = document.getElementById('authPass').value;
    const role = document.querySelector('input[name="role"]:checked').value;
    const phone = document.getElementById('authPhone').value;
    const msg = document.getElementById('authMsg');
    
    if(!name || !pass) return alert('الاسم وكلمة المرور مطلوبة');
    
    // Simple Logic: If phone exists -> Register, else -> Login (Demo)
    let action = phone ? 'register' : 'login';
    
    fetch(`${API_URL}?action=${action}&name=${name}&pass=${pass}&phone=${phone}&role=${role}`)
      .then(res => res.json())
      .then(data => {
        if(data.ok) {
          state.token = data.token;
          state.user = data.data;
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.data));
          location.reload();
        } else {
          msg.textContent = data.msg || 'فشل الدخول';
        }
      }).catch(e => msg.textContent = 'خطأ اتصال');
  }

  function logout() {
    localStorage.clear();
    location.reload();
  }

  /* ───── INIT APP ───── */
  if(state.token && state.user) {
    document.getElementById('loginOverlay').classList.add('hidden');
    document.getElementById('userIcon').textContent = state.user.name[0];
    document.getElementById('pName').textContent = state.user.name;
    document.getElementById('pPhone').textContent = state.user.phone || 'غير محدد';
    
    // Init Map
    initMap();
    // Poll Data
    setInterval(pollData, 3000);
    pollData(); // First run
  }

  /* ───── UI FUNCTIONS ───── */
  function switchTab(id) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    
    document.getElementById('tab-' + id).classList.add('active');
    // Find button and set active (simplified for this demo)
    const btns = document.querySelectorAll('.tab-btn');
    if(id === 'map') btns[0].classList.add('active');
    if(id === 'messages') btns[1].classList.add('active');
    if(id === 'emergency') btns[2].classList.add('active');
    if(id === 'profile') btns[3].classList.add('active');
    
    if(id === 'map' && state.map) setTimeout(() => state.map.invalidateSize(), 100);
  }

  /* ───── MAP LOGIC ───── */
  function initMap() {
    state.map = L.map('map').setView([33.3152, 44.3661], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(state.map);
    
    // Captain Icon
    const crownIcon = L.divIcon({
      html: `<div style="background:#f59e0b;width:30px;height:30px;border-radius:50%;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:16px;">👑</div>`,
      iconSize: [30,30], iconAnchor: [15,15]
    });
    
    state.captainMarker = L.marker([0,0], {icon: crownIcon}).addTo(state.map);
    state.captainMarker.setOpacity(0);

    // Member Icon
    const memIcon = L.divIcon({
      html: `<div style="background:#3b82f6;width:24px;height:24px;border-radius:50%;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:12px;">👤</div>`,
      iconSize: [24,24], iconAnchor: [12,12]
    });
    state.myMarker = L.marker([0,0], {icon: memIcon}).addTo(state.map);
    state.myMarker.setOpacity(0);
  }

  function toggleTracking() {
    const btn = document.getElementById('btnJoin');
    if(state.watchId) {
      navigator.geolocation.clearWatch(state.watchId);
      state.watchId = null;
      btn.textContent = '🚴 انضمام للرحلة ومشاركة الموقع';
      btn.classList.remove('active');
      if(state.myMarker) state.myMarker.setOpacity(0);
    } else {
      btn.textContent = '⏹ إيقاف المشاركة';
      btn.classList.add('active');
      state.watchId = navigator.geolocation.watchPosition(pos => {
        const {latitude, longitude} = pos.coords;
        if(state.myMarker) state.myMarker.setLatLng([latitude, longitude]).setOpacity(1);
        state.map.setView([latitude, longitude], 16);
        // Send location
        fetch(`${API_URL}?action=updateMemberLoc&token=${state.token}&lat=${latitude}&lng=${longitude}`);
      });
    }
  }

  /* ───── DATA LOGIC ───── */
  function pollData() {
    fetch(`${API_URL}?action=getData&token=${state.token}`)
      .then(res => res.json())
      .then(data => {
        if(!data.ok) return;

        // Map: Captain
        if(data.captainLat && data.captainLng) {
          state.captainMarker.setLatLng([data.captainLat, data.captainLng]).setOpacity(1);
        }

        // Map: Distance (Simulation)
        if(data.captainLat) {
           document.getElementById('distVal').textContent = Math.floor(Math.random() * 200) + 50; // Mock distance for demo
        }

        // Messages
        const msgs = [];
        if(data.message) msgs.push({title: 'إشعار من الكابتن', body: data.message, time: new Date().toLocaleTimeString(), type:'info'});
        if(data.emergency) msgs.push({title: '🚨 حالة طوارئ', body: data.emergency, time: new Date().toLocaleTimeString(), type:'danger'});
        
        const container = document.getElementById('messageContainer');
        if(msgs.length > 0) {
           container.innerHTML = msgs.map(m => `
             <div class="msg-card ${m.type === 'danger'?'emergency':''}">
               <div class="msg-header">
                 <span class="msg-title">${m.title}</span>
                 <span class="msg-time">${m.time}</span>
               </div>
               <div class="msg-body">${m.body}</div>
             </div>
           `).join('');
        }

        // Emergency Display
        if(data.emergency) {
           document.getElementById('emergencyDisplay').style.display = 'block';
           document.getElementById('emergencyText').textContent = data.emergency;
        } else {
           document.getElementById('emergencyDisplay').style.display = 'none';
        }

      });
  }

  function triggerEmergency() {
    const msg = prompt('وصف حالة الطوارئ:');
    if(msg) {
      fetch(`${API_URL}?action=setEmergency&token=${state.token}&msg=${msg}`);
      alert('تم إرسال إنذار الطوارئ');
    }
  }
</script>
</body>
</html>
